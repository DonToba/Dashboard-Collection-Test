name: Update Building Dashboard

on:

  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:

  merge:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Merge Kobo Data
        env:
          KOBO_API: ${{ secrets.KOBO_API }}
          KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
          BUILDING_FILE: data/building_footprints.geojson
          OUTPUT_FILE: data/merged_buildings.geojson

        run: |
          python scripts/main.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automatic update from Kobo"
          file_pattern: data/merged_buildings.geojson
